# =============================================================================
# Traefik — entrees a fusionner dans /etc/traefik/dynamic_conf.yaml
#
# Fichier unique => NE PAS coller un 2e bloc `http:`. Ajouter ces entrees sous
# tes clefs existantes http.routers / http.services / http.middlewares.
#
# Aligne sur la convention Spektalis (cf routeur Spektalis-atlas).
# Domaine : pool.spektalis.net  |  VM : 192.168.1.214:3000  |  sans rate limit.
#
# /!\ On utilise `pool-headers` et NON `secure-headers` : la CSP globale durcie
#     bloquerait les tuiles OpenStreetMap (carte blanche) et, si elle contient
#     `require-trusted-types-for`, casserait Leaflet/Recharts (cf bug Atlas).
#     `pool-headers` garde HSTS/nosniff/referrer/permissions mais avec une CSP
#     compatible carte. `crowdsec` est conserve (aucun conflit).
# =============================================================================
http:
  routers:
    Spektalis-pool:
      rule: "Host(`pool.spektalis.net`)"
      entryPoints:
        - websecure
      service: Spektalis-pool
      tls:
        certResolver: letsencrypt
        options: modern
      middlewares:
        - crowdsec
        - pool-headers

  services:
    Spektalis-pool:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.214:3000"

  middlewares:
    pool-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""
          Permissions-Policy: "geolocation=(self), camera=(), microphone=(), payment=()"
          Content-Security-Policy: "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; object-src 'none'"
